<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Page</title>
    <link rel="stylesheet" href="cartStyles.css"/>
</head>
<body>
    <iframe src="header.html" class="iframe_header"></iframe>
    <div class="tabs">
        <input type="radio" name="tab" id="cart" checked>
        <input type="radio" name="tab" id="wishlist">
        <div class="tab-labels">
            <label for="cart">Cart</label>
            <label for="wishlist">Wishlist</label>
        </div>

        <div class="content">
            <div class="cartContent">
                <h2> Cart Items </h2>
                <table class="cartTable">
                    <thead>
                        <th> Product Code</th>
                        <th> Item Name </th>
                        <th> Quantity </th>
                    </thead>
                    <tbody>
                        <tr>
                            <td> P1 </td>
                            <td> Laptop stands </td>
                            <td> 1 </td>
                        </tr>
                        <tr>
                            <td> P2 </td>
                            <td> Mouse </td>
                            <td> 1 </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="wishlistContent">
                <h2> WishList Items </h2>
                <table class="wishTable">
                    <thead>
                        <th> Product Code</th>
                        <th> Item Name </th>
                        <th> Quantity </th>
                    </thead>
                    <tbody>
                        <tr>
                            <td> P3 </td>
                            <td> T-shirt set </td>
                            <td> 1 </td>
                        </tr>
                        <tr>
                            <td> P4 </td>
                            <td> Track Pants </td>
                            <td> 1 </td>
                        </tr>
                    </tbody>
                </table>
                
            </div>
        </div>

    </div>
    
</body>
</html>
